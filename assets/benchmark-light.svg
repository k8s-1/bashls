<svg xmlns="http://www.w3.org/2000/svg" width="840" height="180" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="13">
  <rect width="840" height="180" fill="#ffffff" rx="8"/>

  <!-- shared legend -->
  <rect x="32" y="20" width="10" height="10" fill="#0969da" rx="2"/>
  <text x="48" y="29" fill="#1f2328" font-size="11">bash-language-server</text>
  <rect x="196" y="20" width="10" height="10" fill="#1a7f37" rx="2"/>
  <text x="212" y="29" fill="#1f2328" font-size="11">bashls</text>

  <!-- === STARTUP TIME === -->
  <text x="32" y="60" fill="#1f2328" font-size="14" font-weight="600">Startup</text>

  <rect x="32" y="72" width="150" height="24" fill="#0969da" rx="3"/>
  <text x="188" y="89" fill="#1f2328" font-size="12">439 ms</text>

  <rect x="32" y="104" width="5" height="24" fill="#1a7f37" rx="3"/>
  <text x="43" y="121" fill="#1f2328" font-size="12">15 ms</text>

  <text x="32" y="156" fill="#1f2328" font-size="12"><tspan font-weight="600" fill="#1a7f37">29×</tspan> faster startup</text>

  <!-- === MEMORY === -->
  <text x="310" y="60" fill="#1f2328" font-size="14" font-weight="600">Memory (RSS)</text>

  <rect x="310" y="72" width="150" height="24" fill="#0969da" rx="3"/>
  <text x="466" y="89" fill="#1f2328" font-size="12">197 MB</text>

  <rect x="310" y="104" width="17" height="24" fill="#1a7f37" rx="3"/>
  <text x="333" y="121" fill="#1f2328" font-size="12">22 MB</text>

  <text x="310" y="156" fill="#1f2328" font-size="12"><tspan font-weight="600" fill="#1a7f37">9×</tspan> less memory</text>

  <!-- === LATENCY === -->
  <text x="588" y="60" fill="#1f2328" font-size="14" font-weight="600">Latency</text>

  <rect x="588" y="72" width="150" height="24" fill="#0969da" rx="3"/>
  <text x="744" y="89" fill="#1f2328" font-size="12">1104 ms</text>

  <rect x="588" y="104" width="100" height="24" fill="#1a7f37" rx="3"/>
  <text x="694" y="121" fill="#1f2328" font-size="12">738 ms</text>

  <text x="588" y="156" fill="#1f2328" font-size="12"><tspan font-weight="600" fill="#1a7f37">1.5×</tspan> lower latency</text>
</svg>
