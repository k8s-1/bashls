<svg xmlns="http://www.w3.org/2000/svg" width="640" height="180" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="13">
  <rect width="640" height="180" fill="#ffffff" rx="8"/>

  <!-- shared legend -->
  <rect x="32" y="20" width="10" height="10" fill="#0969da" rx="2"/>
  <text x="48" y="29" fill="#1f2328" font-size="11">bash-language-server</text>
  <rect x="196" y="20" width="10" height="10" fill="#1a7f37" rx="2"/>
  <text x="212" y="29" fill="#1f2328" font-size="11">bashls</text>

  <!-- === STARTUP TIME === -->
  <text x="32" y="60" fill="#1f2328" font-size="14" font-weight="600">Startup</text>

  <rect x="32" y="72" width="240" height="24" fill="#0969da" rx="3"/>
  <text x="278" y="89" fill="#1f2328" font-size="12">318 ms</text>

  <rect x="32" y="104" width="8" height="24" fill="#1a7f37" rx="3"/>
  <text x="46" y="121" fill="#1f2328" font-size="12">10 ms</text>

  <text x="32" y="156" fill="#1f2328" font-size="12"><tspan font-weight="600" fill="#1a7f37">32×</tspan> faster startup</text>

  <!-- === MEMORY === -->
  <text x="340" y="60" fill="#1f2328" font-size="14" font-weight="600">Memory (RSS)</text>

  <rect x="340" y="72" width="240" height="24" fill="#0969da" rx="3"/>
  <text x="586" y="89" fill="#1f2328" font-size="12">73 MB</text>

  <rect x="340" y="104" width="16" height="24" fill="#1a7f37" rx="3"/>
  <text x="362" y="121" fill="#1f2328" font-size="12">5 MB</text>

  <text x="340" y="156" fill="#1f2328" font-size="12"><tspan font-weight="600" fill="#1a7f37">15×</tspan> less memory</text>
</svg>
