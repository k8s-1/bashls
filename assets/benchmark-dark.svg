<svg xmlns="http://www.w3.org/2000/svg" width="600" height="190" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="14">
  <rect width="600" height="190" fill="#0d1117" rx="8"/>

  <!-- shared legend -->
  <rect x="32" y="20" width="10" height="10" fill="#388bfd" rx="2"/>
  <text x="48" y="30" fill="#e6edf3" font-size="13" font-weight="600">bash-language-server</text>
  <rect x="228" y="20" width="10" height="10" fill="#3fb950" rx="2"/>
  <text x="244" y="30" fill="#e6edf3" font-size="13" font-weight="600">bashls</text>

  <!-- === STARTUP TIME === -->
  <text x="50" y="62" fill="#e6edf3" font-size="16" font-weight="600">Startup</text>

  <rect x="50" y="72" width="150" height="24" fill="#388bfd" rx="3"/>
  <text x="206" y="89" fill="#e6edf3" font-size="14" font-weight="600">1500 ms</text>

  <rect x="50" y="104" width="4" height="24" fill="#3fb950" rx="3"/>
  <text x="60" y="121" fill="#e6edf3" font-size="14" font-weight="600">15 ms</text>

  <text x="50" y="160" fill="#e6edf3" font-size="14" font-weight="600"><tspan fill="#3fb950">100×</tspan> faster startup</text>

  <!-- === MEMORY === -->
  <text x="350" y="62" fill="#e6edf3" font-size="16" font-weight="600">Memory (RSS)</text>

  <rect x="350" y="72" width="150" height="24" fill="#388bfd" rx="3"/>
  <text x="506" y="89" fill="#e6edf3" font-size="14" font-weight="600">120 MB</text>

  <rect x="350" y="104" width="16" height="24" fill="#3fb950" rx="3"/>
  <text x="372" y="121" fill="#e6edf3" font-size="14" font-weight="600">12 MB</text>

  <text x="350" y="160" fill="#e6edf3" font-size="14" font-weight="600"><tspan fill="#3fb950">10×</tspan> less memory</text>
</svg>
